<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar CSS Only</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background: #020617;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: black;
            color: white;
            padding: 15px 20px;
            position: relative;
        }

        .logo {
            color: #00ff88;
            font-size: 22px;
            font-weight: bold;
        }

        /* Menu */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
        }

        /* Hide checkbox */
        #menu-toggle {
            display: none;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: white;
            margin: 4px;
            transition: 0.3s;
        }

        /* Mobile */
        @media (max-width: 768px) {

            .hamburger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: 60px;
                right: -100%;
                flex-direction: column;
                background: black;
                width: 200px;
                height: 100vh;
                padding: 20px;
                transition: 0.3s;
            }

            /* When checkbox checked → show menu */
            #menu-toggle:checked~.nav-links {
                right: 0;
            }
/* 
            Animate hamburger into X #menu-toggle:checked+.hamburger span:nth-child(1) {
                transform: rotate(45deg) translate(5px, 5px);
            }

            #menu-toggle:checked+.hamburger span:nth-child(2) {
                opacity: 0;
            }

            #menu-toggle:checked+.hamburger span:nth-child(3) {
                transform: rotate(-45deg) translate(5px, -5px);
            } */
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">MyLogo</div>

        <!-- Hidden checkbox -->
        <input type="checkbox" id="menu-toggle">

        <!-- Hamburger -->
        <label for="menu-toggle" class="hamburger">
            <span></span>
            <span></span>
            <!-- <span></span> -->
        </label>

        <!-- Menu -->
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

</body>

</html>
